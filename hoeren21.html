<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Hörverstehen & Bildzuordnung</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1e4e8c;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --success-color: #48bb78;
            --success-bg: #f0fff4;
            --error-color: #f56565;
            --error-bg: #fff5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
            padding: 24px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 1.5rem;
            text-align: center;
        }

        .progress {
            text-align: center;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .instructions {
            font-size: 0.95rem;
            color: #4a5568;
            text-align: center;
            margin-bottom: 24px;
        }

        /* Audio-Bereich */
        .audio-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ebf8ff;
            border: 2px dashed #90cdf4;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .audio-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(43, 108, 176, 0.3);
            transition: all 0.2s ease;
        }

        .audio-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .audio-text-fallback {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #4a5568;
            font-style: italic;
            display: none;
        }

        /* Bilder-Grid */
        .images-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (min-width: 480px) {
            .images-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .image-card {
            background: #f8fafc;
            border: 3px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-card:hover {
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }

        .image-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            user-select: none;
        }

        .image-caption {
            font-weight: 600;
            font-size: 1rem;
            color: #4a5568;
        }

        /* Interaktions-Zustände */
        .images-grid.answered .image-card {
            pointer-events: none;
            opacity: 0.6;
        }

        .images-grid.answered .image-card.correct-choice {
            border-color: var(--success-color) !important;
            background-color: var(--success-bg) !important;
            opacity: 1 !important;
        }

        .images-grid.answered .image-card.wrong-choice {
            border-color: var(--error-color) !important;
            background-color: var(--error-bg) !important;
            opacity: 1 !important;
        }

        /* Kontroll-Buttons */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        .action-btn {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        #nextBtn {
            background-color: var(--primary-color);
            display: none;
        }
        #nextBtn:hover { background-color: var(--primary-hover); }

        #resetBtn {
            background-color: #718096;
            display: none;
        }
        #resetBtn:hover { background-color: #4a5568; }

        .feedback {
            text-align: center;
            margin-top: 16px;
            font-weight: bold;
            min-height: 24px;
            font-size: 1.1rem;
        }
        .feedback.success { color: var(--success-color); }
        .feedback.error { color: var(--error-color); }
    </style>
</head>
<body>

<div class="game-container">
    <h2>Hörverstehen & Bildzuordnung</h2>
    <div class="progress" id="progressTrack">Frage 1 von 3</div>
    <p class="instructions">
        Klicke auf den Audio-Button, höre genau hin und wähle das dazu passende Bild aus.
    </p>

    <div class="audio-section">
        <button class="audio-btn" id="playAudioBtn" title="Satz anhören">🔊</button>
        <div class="audio-text-fallback" id="fallbackText">(Lese-Ersatz: „...“)</div>
    </div>

    <div class="images-grid" id="imagesGrid">
        <!-- Bild-Karte A -->
        <div class="image-card" id="cardA" data-choice="A">
            <div class="image-icon" id="iconA">🚪</div>
            <div class="image-caption" id="captionA">An der Tür klingeln / Hingehen (Richtung)</div>
        </div>
        <!-- Bild-Karte B -->
        <div class="image-card" id="cardB" data-choice="B">
            <div class="image-icon" id="iconB">🛋️</div>
            <div class="image-caption" id="captionB">Auf dem Sofa sitzen / Da sein (Ort)</div>
        </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <button class="action-btn" id="nextBtn">Nächste Frage</button>
        <button class="action-btn" id="resetBtn">Neu starten</button>
    </div>
</div>

<script>
    const audioQuizData = [
        {
            russianText: "Я иду в гости.",
            correctChoice: "A", 
            explanation: "Richtig! „Я иду в гости“ bedeutet „Ich gehe zu Besuch“ (Richtung)."
        },
        {
            russianText: "Я в гостях.",
            correctChoice: "B",
            explanation: "Richtig! „Я в гостях“ bedeutet „Ich bin zu Besuch“ (Ort)."
        },
        {
            russianText: "Мы вчера ходили в гости.",
            correctChoice: "A",
            explanation: "Richtig! „ходили в гости“ beschreibt, dass man gestern dorthin gegangen ist."
        }
    ];

    let currentIndex = 0;
    let voice = null;

    const progressTrack = document.getElementById('progressTrack');
    const playAudioBtn = document.getElementById('playAudioBtn');
    const fallbackText = document.getElementById('fallbackText');
    const imagesGrid = document.getElementById('imagesGrid');
    const cardA = document.getElementById('cardA');
    const cardB = document.getElementById('cardB');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    function loadVoices() {
        if ('speechSynthesis' in window) {
            const voices = speechSynthesis.getVoices();
            voice = voices.find(v => v.lang.startsWith('ru')) || null;
        }
    }
    
    if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function playAudio() {
        const text = audioQuizData[currentIndex].russianText;
        if ('speechSynthesis' in window && voice) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voice;
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85; 
            speechSynthesis.speak(utterance);
        } else {
            fallbackText.textContent = `Hinweis für die Aufgabe: Gelesen wird „ ${text} "`;
            fallbackText.style.display = 'block';
        }
    }

    function loadQuestion() {
        imagesGrid.classList.remove('answered');
        cardA.classList.remove('correct-choice', 'wrong-choice');
        cardB.classList.remove('correct-choice', 'wrong-choice');
        feedback.textContent = "";
        feedback.className = "feedback";
        nextBtn.style.display = 'none';
        fallbackText.style.display = 'none';

        progressTrack.textContent = `Frage ${currentIndex + 1} von ${audioQuizData.length}`;
        setTimeout(playAudio, 300);
    }

    function handleChoice(chosenCard) {
        if (imagesGrid.classList.contains('answered')) return;

        imagesGrid.classList.add('answered');
        const currentData = audioQuizData[currentIndex];
        const chosenValue = chosenCard.getAttribute('data-choice');

        if (chosenValue === currentData.correctChoice) {
            chosenCard.classList.add('correct-choice');
            feedback.textContent = currentData.explanation;
            feedback.className = "feedback success";
        } else {
            chosenCard.classList.add('wrong-choice');
            const correctCard = currentData.correctChoice === 'A' ? cardA : cardB;
            correctCard.classList.add('correct-choice');
            feedback.textContent = "Leider nicht ganz. Das Verb passte nicht zum Bild.";
            feedback.className = "feedback error";
        }

        if (currentIndex < audioQuizData.length - 1) {
            nextBtn.style.display = 'block';
        } else {
            // Nach der letzten Frage erscheint der Neustart-Button
            resetBtn.style.display = 'block';
        }
    }

    playAudioBtn.addEventListener('click', playAudio);
    cardA.addEventListener('click', () => handleChoice(cardA));
    cardB.addEventListener('click', () => handleChoice(cardB));

    nextBtn.addEventListener('click', () => {
        currentIndex++;
        loadQuestion();
    });

    // Neustart-Logik setzt das Spiel zurück
    resetBtn.addEventListener('click', () => {
        currentIndex = 0;
        resetBtn.style.display = 'none';
        loadQuestion();
    });

    loadQuestion();
</script>

</body>
</html>
