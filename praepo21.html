<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Multiple-Choice Quiz</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1e4e8c;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --success-color: #48bb78;
            --success-bg: #f0fff4;
            --error-color: #f56565;
            --error-bg: #fff5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            width: 100%;
            padding: 24px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 1.5rem;
            text-align: center;
        }

        .instructions {
            font-size: 0.95rem;
            color: #4a5568;
            text-align: center;
            margin-bottom: 28px;
        }

        .question-block {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: #1a202c;
        }

        /* Antwort-Optionen Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-label {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .option-label:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary-color);
        }

        /* Deaktivierter Zustand für nicht gewählte Optionen nach dem Klick */
        .question-block.answered .option-label {
            cursor: default;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Direktes Feedback nach Klick */
        .question-block.answered .option-label.correct-answer {
            background-color: var(--success-bg) !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
            opacity: 1 !important;
        }

        .question-block.answered .option-label.wrong-answer {
            background-color: var(--error-bg) !important;
            border-color: var(--error-color) !important;
            color: var(--error-color) !important;
            opacity: 1 !important;
        }

        /* Kontroll-Buttons */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        button {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            background-color: #718096;
            display: none; /* Erscheint erst, wenn alles beantwortet wurde */
        }

        button:hover {
            background-color: #4a5568;
        }

        .feedback {
            text-align: center;
            margin-top: 16px;
            font-weight: bold;
            min-height: 24px;
        }
        .feedback.success { color: var(--success-color); }
    </style>
</head>
<body>

<div class="game-container">
    <h2>Multiple-Choice: Präposition & Kasus</h2>
    <p class="instructions">
        Klicke auf die richtige Antwort. Du erhältst sofort eine Rückmeldung.
    </p>

    <form id="quizForm">
        <!-- Frage 1 -->
        <div class="question-block" data-correct="B">
            <div class="question-text">1. Wie sagt man: „Ich bin zu Besuch“?</div>
            <div class="options-grid">
                <label class="option-label"><input type="radio" name="q1" value="A"> быть в гости</label>
                <label class="option-label"><input type="radio" name="q1" value="B"> быть в гостях</label>
                <label class="option-label"><input type="radio" name="q1" value="C"> идти в гости</label>
                <label class="option-label"><input type="radio" name="q1" value="D"> идти в гостях</label>
            </div>
        </div>

        <!-- Frage 2 -->
        <div class="question-block" data-correct="A">
            <div class="question-text">2. Wie sagt man: „Ich gehe zu Besuch“?</div>
            <div class="options-grid">
                <label class="option-label"><input type="radio" name="q2" value="A"> идти в гости</label>
                <label class="option-label"><input type="radio" name="q2" value="B"> идти в гостях</label>
                <label class="option-label"><input type="radio" name="q2" value="C"> быть в гости</label>
                <label class="option-label"><input type="radio" name="q2" value="D"> быть в гостях</label>
            </div>
        </div>

        <!-- Frage 3 -->
        <div class="question-block" data-correct="D">
            <div class="question-text">3. Welche Form nutzt man für den reinen Plural von „Gäste“?</div>
            <div class="options-grid">
                <label class="option-label"><input type="radio" name="q3" value="A"> гость</label>
                <label class="option-label"><input type="radio" name="q3" value="B"> в гости</label>
                <label class="option-label"><input type="radio" name="q3" value="C"> в гостях</label>
                <label class="option-label"><input type="radio" name="q3" value="D"> гости</label>
            </div>
        </div>
    </form>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <button id="resetBtn">Neu starten</button>
    </div>
</div>

<script>
    const quizForm = document.getElementById('quizForm');
    const questionBlocks = document.querySelectorAll('.question-block');
    const resetBtn = document.getElementById('resetBtn');
    const feedback = document.getElementById('feedback');

    let answeredCount = 0;

    // Direktes Feedback-System beim Klick
    questionBlocks.forEach(block => {
        const labels = block.querySelectorAll('.option-label');
        const correctAnswer = block.getAttribute('data-correct');

        labels.forEach(label => {
            const input = label.querySelector('input');

            input.addEventListener('change', () => {
                // Verhindert mehrfaches Werten, falls der Block bereits beantwortet wurde
                if (block.classList.contains('answered')) return;

                block.classList.add('answered');
                answeredCount++;

                const selectedValue = input.value;

                // Alle Radio-Inputs im Block deaktivieren
                block.querySelectorAll('input').forEach(i => i.disabled = true);

                // Feedback-Klassen verteilen
                labels.forEach(l => {
                    const currentInput = l.querySelector('input');
                    if (currentInput.value === correctAnswer) {
                        l.classList.add('correct-answer');
                    }
                    if (currentInput.value === selectedValue && selectedValue !== correctAnswer) {
                        l.classList.add('wrong-answer');
                    }
                });

                // Prüfen, ob alle Fragen beantwortet wurden
                if (answeredCount === questionBlocks.length) {
                    feedback.textContent = "Alle Fragen beantwortet! 🎉";
                    feedback.className = "feedback success";
                    resetBtn.style.display = 'block';
                }
            });
        });
    });

    // --- NEUSTART ---
    resetBtn.addEventListener('click', () => {
        quizForm.reset();
        answeredCount = 0;
        feedback.textContent = "";
        feedback.className = "feedback";
        resetBtn.style.display = 'none';

        questionBlocks.forEach(block => {
            block.classList.remove('answered');
            block.querySelectorAll('.option-label').forEach(label => {
                label.classList.remove('correct-answer', 'wrong-answer');
                label.querySelector('input').disabled = false;
            });
        });
    });
</script>

</body>
</html>
